name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    # Fast suite: imports, schemas, data-validation, stub-agent run.
    # Heavy tests (GPU, Ollama, Qdrant) are gated via pytest markers and skipped here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + dev deps
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e '.[dev]'

      - name: Ruff lint
        run: |
          source .venv/bin/activate
          ruff check src tests eval scripts

      - name: Ruff format check
        run: |
          source .venv/bin/activate
          ruff format --check src tests eval

      - name: Fetch starter data
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends unzip
          bash scripts/fetch_data.sh
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"

      - name: Pytest (fast tests only)
        run: |
          source .venv/bin/activate
          pytest -q -m "not gpu and not ollama and not qdrant and not slow" \
              --durations=10 tests/ eval/

  docker-build:
    # Build the starter image on every PR to catch Dockerfile regressions early.
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: merabro/biolab-agent-base:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          docker run --rm merabro/biolab-agent-base:ci \
              python -c "import biolab_agent; print(biolab_agent.__version__)"
